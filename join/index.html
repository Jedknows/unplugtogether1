<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unplug Together — Join Your Partner</title>
  <!-- Smart App Banner: shows native iOS banner to open/install the app -->
  <meta name="apple-itunes-app" content="app-id=6760623557, app-argument=join">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #F2A0A0 50%, #B8A9E8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(139,111,90,0.15);
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #4A4A4A;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: #8B6F5A;
      opacity: 0.6;
      margin-bottom: 24px;
    }
    .code-box {
      background: #F0EDE8;
      border-radius: 16px;
      padding: 16px 24px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #8B7AC7;
      margin-bottom: 24px;
    }
    .open-btn {
      display: inline-block;
      background: linear-gradient(135deg, #B8A9E8, #8B7AC7);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 20px;
      margin-bottom: 12px;
      transition: transform 0.15s;
    }
    .open-btn:active { transform: scale(0.97); }
    .fallback {
      font-size: 12px;
      color: #8B6F5A;
      opacity: 0.5;
      margin-top: 12px;
    }
    .fallback a { color: #8B7AC7; }
    .copy-hint {
      font-size: 11px;
      color: #8B6F5A;
      opacity: 0.4;
      margin-top: 4px;
    }
    .copied-toast {
      display: none;
      font-size: 12px;
      color: #8B7AC7;
      font-weight: 600;
      margin-top: 6px;
    }
    .copied-toast.show {
      display: block;
      animation: fadeInOut 1.5s ease;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <script>
    function getCode() {
      // Try path: /join/ABC123
      const path = window.location.pathname;
      const match = path.match(/\/join\/([A-Z0-9]+)/i);
      if (match) return match[1].toUpperCase();
      // Try query: /join?code=ABC123
      const params = new URLSearchParams(window.location.search);
      return (params.get('code') || '').toUpperCase();
    }

    document.addEventListener('DOMContentLoaded', function() {
      const code = getCode();
      if (!code) return;

      // Show the code on the page
      document.getElementById('code-display').textContent = code;

      // Set the "open in app" button to use custom URL scheme
      // (Universal links won't re-trigger from within the browser on the same domain)
      const deepLink = 'unplugtogether://join?code=' + code;
      document.getElementById('open-btn').href = deepLink;

      // Copy code to clipboard when tapping the code box
      const codeBox = document.getElementById('code-display');
      codeBox.style.cursor = 'pointer';
      codeBox.addEventListener('click', function() {
        navigator.clipboard.writeText(code).then(function() {
          const toast = document.getElementById('copied-toast');
          toast.classList.remove('show');
          void toast.offsetWidth; // force reflow
          toast.classList.add('show');
        }).catch(function() {});
      });
    });
  </script>
</head>
<body>
  <div class="card">
    <div class="emoji">🌱</div>
    <h1>unplug together</h1>
    <p class="subtitle">your partner invited you to grow a garden together</p>
    <div class="code-box" id="code-display">------</div>
    <p class="copy-hint">tap code to copy</p>
    <div class="copied-toast" id="copied-toast">copied!</div>
    <div style="margin-top: 20px;">
      <a class="open-btn" id="open-btn" href="#">open in app</a>
    </div>
    <p class="fallback">
      Don't have the app yet?<br>
      <a href="https://apps.apple.com/app/unplugtogether/id6760623557">Download on the App Store</a>
    </p>
  </div>
</body>
</html>
